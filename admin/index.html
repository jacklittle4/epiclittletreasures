<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Epic Little Treasures — Editor</title>
    <!-- Vintage-cottage theme for the Sveltia CMS editor (warm cream + plum, larger text). -->
    <style>
      :root,
      .sui {
        color-scheme: light !important;
        --sui-background-color-1-hsl: 38 44% 97% !important;
        --sui-background-color-2-hsl: 37 40% 95% !important;
        --sui-background-color-3-hsl: 35 34% 92% !important;
        --sui-background-color-4-hsl: 33 28% 88% !important;
        --sui-background-color-5-hsl: 32 24% 83% !important;
        --sui-foreground-color-1-hsl: 28 22% 20% !important;
        --sui-foreground-color-2-hsl: 28 16% 32% !important;
        --sui-foreground-color-3-hsl: 28 13% 44% !important;
        --sui-foreground-color-4-hsl: 28 11% 54% !important;
        --sui-foreground-color-5-hsl: 28 9% 64% !important;
        --sui-border-color-1-hsl: 32 16% 66% !important;
        --sui-border-color-2-hsl: 33 20% 78% !important;
        --sui-border-color-3-hsl: 34 26% 86% !important;
        --sui-content-background-color: hsl(38 44% 97%) !important;
        --sui-primary-background-color: hsl(37 40% 95%) !important;
        --sui-primary-background-color-translucent: hsl(37 40% 95% / 85%) !important;
        --sui-secondary-background-color: hsl(35 34% 92%) !important;
        --sui-secondary-background-color-translucent: hsl(35 34% 92% / 85%) !important;
        --sui-control-background-color: hsl(40 50% 99%) !important;
        --sui-button-background-color: hsl(36 34% 91%) !important;
        --sui-checkbox-background-color: hsl(40 50% 99%) !important;
        --sui-code-background-color: hsl(36 34% 90%) !important;
        --sui-hover-background-color: hsl(32 30% 55% / 16%) !important;
        --sui-active-background-color: hsl(338 28% 47% / 16%) !important;
        --sui-selected-background-color: hsl(338 30% 55% / 22%) !important;
        --sui-disabled-background-color: hsl(36 20% 92%) !important;
        --sui-disabled-foreground-color: hsl(30 10% 60%) !important;
        --sui-highlight-foreground-color: hsl(28 22% 18%) !important;
        --sui-primary-border-color: hsl(33 20% 78%) !important;
        --sui-secondary-border-color: hsl(34 24% 84%) !important;
        --sui-control-border-color: hsl(33 22% 74%) !important;
        --sui-button-border-color: hsl(33 22% 76%) !important;
        --sui-checkbox-border-color: hsl(33 20% 62%) !important;
        --sui-control-foreground-color: hsl(28 16% 30%) !important;
        --sui-primary-foreground-color: hsl(28 16% 30%) !important;
        --sui-secondary-foreground-color: hsl(28 13% 44%) !important;
        --sui-primary-accent-color: hsl(338 30% 46%) !important;
        --sui-primary-accent-color-dark: hsl(338 32% 40%) !important;
        --sui-primary-accent-color-light: hsl(338 30% 52%) !important;
        --sui-primary-accent-color-inverted: hsl(40 40% 99%) !important;
        --sui-primary-accent-color-text: hsl(338 40% 42%) !important;
        --sui-primary-accent-color-translucent: hsl(338 45% 50% / 55%) !important;
        --sui-primary-accent-color-translucent-light: hsl(338 45% 50% / 30%) !important;
        --sui-focus-ring-color: hsl(338 50% 50% / 55%) !important;
        --sui-font-size-default: 15px !important;
        --sui-control-font-size: 15px !important;
      }
    </style>
  </head>
  <body>
    <!-- Sveltia CMS (modern drop-in successor to Decap; reads admin/config.yml). -->
    <!-- Pinned to a fixed version so a surprise beta release can't break the editor. -->
    <script src="https://unpkg.com/@sveltia/cms@0.172.1/dist/sveltia-cms.js"></script>
  </body>
</html>
