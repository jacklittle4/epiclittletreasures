backend:
  name: github
  repo: jacklittle4/epiclittletreasures
  branch: main
  base_url: https://sveltia-cms-auth.aphelionsystems-dev.workers.dev

media_folder: "assets"
public_folder: "assets"
site_url: https://www.epiclittletreasures.com
display_url: https://www.epiclittletreasures.com
logo_url: https://www.epiclittletreasures.com/assets/logo-moth.svg
app_title: "Epic Little Treasures"

editor:
  preview: false

collections:
  - name: shop
    label: "🛍️ Products"
    icon: storefront
    description: "Your shop items. Tap one to edit it, or use the + button to add a new one."
    files:
      - name: products
        label: "Products & the homepage deal"
        file: "products.json"
        format: json
        fields:
          - name: products
            label: "Products"
            label_singular: "Product"
            widget: list
            summary: "{{fields.name}} — {{fields.price}}"
            hint: "Tap + to add an item, the trash icon to remove one, and drag to reorder."
            fields:
              - { name: name, label: "Name", widget: string, hint: "e.g. 15-pull bundle" }
              - { name: image, label: "Photo", widget: image, required: false, choose_url: false, hint: "Tap to upload a photo from your device." }
              - { name: price, label: "Price", widget: string, hint: "Type it exactly how it should show, e.g. $45" }
              - { name: status, label: "Availability", widget: select, default: "available", options: [{ label: "Available", value: "available" }, { label: "Sold out", value: "sold-out" }, { label: "Made to order", value: "custom-order" }] }
              - { name: summary, label: "Short description", widget: text, hint: "A sentence or two shown under the name." }
              - { name: category, label: "Type", widget: select, default: "Live bundles", options: [{ label: "Live bundle", value: "Live bundles" }, { label: "Custom / other", value: "Custom" }], hint: "Live bundle shows it in the pull-bundle prices at the top of the shop." }
              - { name: payLink, label: "Buy link (card / Klarna / Affirm)", widget: string, required: false, hint: "Optional. Paste the Stripe Payment Link for this item to offer card, Klarna, and Affirm at checkout." }
              - { name: id, widget: hidden }
          - name: shop
            label: "Homepage deal & shop info"
            widget: object
            collapsed: true
            hint: "The homepage deal banner and your links. These rarely change — tap to open."
            fields:
              - { name: promoEnabled, label: "Show the homepage deal banner?", widget: boolean, default: false, hint: "Turn on to show the ribbon at the top of the home page." }
              - { name: promoText, label: "Deal banner text", widget: string, required: false, default: "5 extra envelopes FREE with every order!", hint: "Keep it short and sweet." }
              - { name: name, label: "Shop name", widget: string }
              - { name: email, label: "Email", widget: string }
              - { name: phone, label: "Phone (shown on the site)", widget: string }
              - { name: phoneHref, label: "Phone link", widget: string, hint: "Same number, no spaces, with a + in front: +17173194692" }
              - { name: facebook, label: "Facebook URL", widget: string }
              - { name: tiktok, label: "TikTok URL", widget: string }
              - { name: etsy, label: "Etsy URL", widget: string }
              - { name: cashApp, label: "Cash App link", widget: string }
              - { name: venmo, label: "Venmo link", widget: string }

  - name: live
    label: "🔴 Live now"
    icon: sensors
    description: "Flip this ON when you start a TikTok LIVE and OFF when you finish. It shows a banner on the home page."
    files:
      - name: live
        label: "Live banner"
        file: "live.json"
        format: json
        fields:
          - { name: isLive, label: "Are you live right now?", widget: boolean, default: false, hint: "ON shows the Live banner on the home page. Turn it OFF when you're done." }
          - { name: heading, label: "Message (optional)", widget: string, required: false, default: "I'm live on TikTok right now!", hint: "The big line on the banner. Leave as-is if unsure." }
          - { name: subtext, label: "Small line (optional)", widget: string, required: false, hint: "One short sentence under the message." }
          - { name: buttonLabel, widget: hidden, default: "Watch the live" }
          - { name: url, widget: hidden, default: "https://www.tiktok.com/@stephanie.davis015/live" }

  - name: workshops
    label: "🎀 Classes"
    icon: school
    description: "Your teaching classes, shown on the Workshops page."
    files:
      - name: workshops
        label: "Classes"
        file: "workshops.json"
        format: json
        fields:
          - name: workshops
            label: "Classes"
            label_singular: "Class"
            widget: list
            summary: "{{fields.title}} — {{fields.date}}"
            hint: "Tap + to add a class. Delete a class when it's over."
            fields:
              - { name: title, label: "Class name", widget: string, hint: "e.g. Paper Bag Junk Journal" }
              - { name: date, label: "Date", widget: datetime, type: date, format: "YYYY-MM-DD", time_format: false, hint: "Pick the date of the class." }
              - { name: time, label: "Time", widget: string, required: false, hint: "e.g. 6 PM ET" }
              - { name: price, label: "Price", widget: string, required: false, hint: "e.g. $50" }
              - { name: location, label: "Where", widget: string, required: false, default: "Live on TikTok @stephanie.davis015", hint: "Where the class happens." }
              - { name: description, label: "Details / what to bring", widget: text, hint: "Describe the class and list any supplies to bring." }
              - { name: signupUrl, widget: hidden, default: "contact.html?item=workshop" }
              - { name: id, widget: hidden }
