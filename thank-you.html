<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Thank you for contacting Epic Little Treasures." />
    <meta name="robots" content="noindex" />
    <title>Thank You | Epic Little Treasures</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Dancing+Script:wght@600;700&family=Source+Sans+3:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=29" />
  </head>
  <body>
    <main>
      <section class="page-hero page-shell">
        <p class="eyebrow">Message sent</p>
        <h1>Thank you. Your note was sent.</h1>
        <p>
          If this was about a payment, shipping details, pickup, or a custom piece,
          Stephanie can follow up using the contact details you provided.
        </p>
        <div class="hero-actions">
          <a class="button button-primary" href="treasures.html">Back to shop</a>
          <a class="button button-secondary" href="index.html">Home</a>
        </div>
      </section>
    </main>
    <script>
      // When Stripe sends a paid buyer back here, empty their cart and switch
      // the copy to an order confirmation. (Contact-form visitors see the
      // default "message sent" wording.)
      (function () {
        var params = new URLSearchParams(location.search);
        if (params.get("order") !== "success") return;
        try {
          localStorage.removeItem("elt-cart-v1");
        } catch (e) {}
        var eyebrow = document.querySelector(".eyebrow");
        var heading = document.querySelector("h1");
        var lead = document.querySelector("main p");
        if (eyebrow) eyebrow.textContent = "Order received";
        if (heading) heading.textContent = "Thank you! Your order is in.";
        if (lead) {
          lead.textContent =
            "Your payment went through and your bundle preferences came along with it. Stephanie will hand-pick your pulls and ship them out, and a receipt is on its way from Stripe.";
        }
        // Tell the shop about the paid order (fires once per order per browser).
        var sid = params.get("session_id");
        if (!sid) return;
        var key = "elt-notified-" + sid;
        var seen = null;
        try {
          seen = localStorage.getItem(key);
        } catch (e) {}
        if (seen) return;
        try {
          localStorage.setItem(key, "1");
        } catch (e) {}
        fetch("/api/order-notify", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ session_id: sid }),
        }).catch(function () {});
      })();
    </script>
  </body>
</html>
